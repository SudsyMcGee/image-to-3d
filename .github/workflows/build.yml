name: Build and Push Docker Image

on:
  push:
    branches: [main, master]
    paths:
      - Dockerfile
      - handler.py
      - requirements.txt
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/sudsymcgee/trellis2-stl:latest
            ghcr.io/sudsymcgee/trellis2-stl:v12
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            MODEL_ID_ARG=JeffreyXiang/TRELLIS-image-large
