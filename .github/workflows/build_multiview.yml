name: Build and Push Zero123++ Image

on:
  push:
    branches: [main, master]
    paths:
      - Dockerfile.multiview
      - handler_multiview.py
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.multiview
          push: true
          tags: ghcr.io/sudsymcgee/zero123plus:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
